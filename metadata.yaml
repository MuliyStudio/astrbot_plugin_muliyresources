name: astrbot_plugin_muliyresources
author: 暮黎 Muliy
display_name: 暮黎资源聚合
short_desc: 影视+游戏+软件资源搜索 & 软件日报 & 网易云语音名片 & 摸头杀GIF & 舔狗表情，支持 LLM 自然语言交互
desc: |
  整合影视搜索、游戏搜索与软件日报&搜索的全能资源插件。

  🎬 影视搜索功能（双源自动切换）：
  - /找影视 <影视名> — 搜索影视
  - 配置了教父.com(新站)账号密码 → 走新站：需登录，含在线播放(多节点)+网盘资源(多网盘)双模式
    · 自动从挂了.com 探测最低延迟的可用域名
    · PoW 工作量证明 + 账号登录（登录态缓存复用）
    · 选影视 → 选资源类型 → 选节点/网盘 → 合并转发(标题+封面+简介+链接)
  - 未配置教父.com 账号密码 → 自动回退 a123tv 旧站（无需登录，仅在线播放切换线路）
  - 源由账号自动切换，无需手动配置；movie_source 显式填 a123tv 可强制旧站
  - LLM 自动调用 search_movie 工具
  - 自然语言触发："帮我找庆余年"、"我想看怪物"、"找个搞笑电影"

  🎮 游戏搜索功能：
  - /找游戏 <游戏名> — 搜索游戏（xdgame.com 源）
  - 需配置 xdgame 账号密码 + 有效 Cookie
  - 交互式选择，支持翻页（上一页/下一页/跳转 N）
  - 群聊发合并转发（文字+截图），私聊发 HTML 文件
  - LLM 自动调用 search_resource / search_game 工具
  - 自然语言触发："帮我找死亡搁浅"、"有没有GTA5"

  📰 软件日报功能：
  - 每日定时从 x6d.com 抓取最新软件更新并推送到群聊
  - 手动触发 /software_report 命令
  - 支持多群推送，可选生成精美列表图片
  - 打包 ZIP 发送到群文件

  🔍 软件搜索功能：
  - /找软件 <资源名> — 在 x6d.com 上搜索软件/资源
  - 交互式选择，支持翻页
  - 群聊发合并转发，私聊发 HTML 文件
  - LLM 自动调用 search_resource / search_software 工具
  - 自然语言触发："帮我找Photoshop"、"我想下载IDM"

  🤖 LLM 工具链 (v1.1.0 新增)：
  - search_resource — 统一智能搜索（自动判断游戏/软件）
  - search_movie — 影视搜索（a123tv.com）
  - select_search_result — 用户选数字 → 获取详情和下载链接
  - select_download_link — 用户选网盘 → 发送真实下载地址+提取码
  - 智能回退：游戏无结果自动尝试软件搜索（反之亦然）

  🎵 网易云语音名片 (v1.9.0 新增)：
  - 发送网易云歌曲链接 / 小程序分享 → 自动解析为 mp3 直链
  - 下载后用 ffmpeg 截取「歌曲中间三分之一」作为语音发送（QQ 语音 10 分钟内均可，默认上限 600 秒）
  - 通过 QQ 语音（Record）发送，并附歌曲名片（歌名/歌手/专辑）
  - 自动模式：消息含网易云链接或小程序即触发
  - 命令模式：/wyy <网易云链接或歌曲ID> 手动触发
  - 解析后端：自建 NeteaseCloudMusicApi 实例（wyy_custom_url，唯一后端；公共站 wyapi/qzxdp 已于 v1.9.3 移除）
  - 配置项：wyy_auto_parse / wyy_music_type / wyy_custom_url / wyy_cookie / wyy_clip_seconds / wyy_clip_start_ratio / wyy_audio_format 等
  - 🆕 VIP 解析：配置 wyy_cookie（黑胶会员 Cookie）即可解析 VIP/付费歌曲（网易云仅在带会员 Cookie 时返回直链）
  - 🆕 扫码登录 (v1.9.6 / 已恢复)：管理员发送 /wyy_login 获取登录二维码，用网易云 App 扫码确认后自动提取会员 Cookie 写入 wyy_cookie，无需手动 F12 抓取（需 wyy_custom_url 自建 NeteaseCloudMusicApi 后端在线，且依赖网易云官方 /login/qr/* 接口可用性）
  - 🔧 (v1.9.7) 权限统一：/wyy_login 与 /game_cookie_refresh 均改用 AStrBot 内置管理员身份判定（event.is_admin() / role），移除 /game_cookie_refresh 的固定 QQ 白名单

  🎞️ 视频链接解析 (v1.9.8 新增/优化，v1.9.14 交互式选接口)：
  - 自动识别消息中的爱奇艺/腾讯视频/优酷/芒果TV/乐视视频/搜狐视频 分享链接（含 QQ 分享卡片 [CQ:json]）
  - 发分享卡片/链接后先弹出**解析接口菜单**（内置 10 个命名接口：虾米/M1907/七哥/咸鱼/极速/PlayerJY/789/fongmi/花旗/937，可配自定义），用户回复序号选择
  - 选中接口后用其模板拼出解析播放页直链，无头浏览器对该播放页截图，最终以**合并转发（聊天记录）**样式发送 标题+简介+截图+直链
  - 标题/简介/封面优先用分享卡片自带字段，缺失时抓分享页 OG 标签兜底
  - 自动模式：消息含上述平台链接即触发（受 video_parse_enabled 开关控制）；video_vip_parse 控制是否走交互式 VIP 解析（关闭则直接发首接口解析播放页）
  - 爱奇艺分享中转页(playShare?shareId=) 自动调接口换成真实播放页 vu，避免假链接解析失败
  - 命令模式：/vparse <视频链接> 手动触发
  - 说明：真实可播放流直链由影视站 VIP 解析产出；未配置影视账号/解析失败时才退回 OG 播放页地址

  🤚 摸头杀 PetPet (v1.9.16 新增)：
  - 摸摸 @某人 — 生成摸头GIF动图，摸@到的人的头
  - 摸摸 — 无@时摸自己的头
  - 摸头 — 别名命令，效果同摸摸
  - 基于 PetPet 模板生成 10 帧透明 GIF（128×128，循环播放）
  - 自动获取被@成员的 QQ 头像，生成后发送到当前会话
  - 支持同时@多人（最多5个），逐个生成GIF
  - 依赖 Pillow 库（pip install pillow）

  🐴 舔狗表情（给你一脚）：
  - 给你一脚 @某成员 — 生成「马踢舔狗」GIF 表情
  - 发送者 = 踢人者（右下角文字），被@成员 = 舔狗（左上角文字，自动加「舔狗」后缀）
  - 无@时踢自己，多个@时只踢第一个
  - 逆向自 diydoutu.com/diy/doutu/389，本地 Pillow 叠加文字生成（含 Noto Sans SC 字体）
  - 别名关键词：一脚 / 踹 / 踢 / kick
  - 依赖 Pillow 库（pip install pillow）

  💆 按摩表情（给我按摩）：
  - 给我按摩 @某成员 — 生成「柴犬按摩」GIF 表情（逆向自 diydoutu.com/diy/doutu/401）
  - 发送者 = 按摩者（右上角），被@成员 = 被按摩者（左下角）
  - 无@时按摩自己，多个@时只按摩第一个
  - 别名关键词：给我揉揉
  - 依赖 Pillow 库（pip install pillow）

  🖼️ 头像优先渲染（v1.9.17 起）：
  - 舔狗 / 按摩表情统一改用成员圆形头像贴图（QQ 平台自动拉取，其它平台回退白字兜底）
  - 实际渲染直径 = 配置 size + 15（边距），坐标见 core/doutu_common.py 的 slot 位置
  - 逆向模板 + 本地 Pillow 文字/头像叠加，零浏览器依赖

version: "1.10.2"
support_platforms:
  - aiocqhttp
  - telegram
  - slack
  - lark
  - discord
