name: astrbot_plugin_muliyresources
author: 暮黎 Muliy
display_name: 暮黎资源聚合
short_desc: 影视+游戏+软件资源搜索 & 小说搜索下载(so-novel) & 软件日报 & 网易云语音名片 & 摸头杀GIF & 舔狗表情，支持 LLM 自然语言交互
desc: |
  整合影视搜索、游戏搜索、软件日报&搜索，以及基于 so-novel 的多源聚合小说搜索与下载的全能资源插件。
  还有vip视频解析功能，支持爱奇艺/腾讯视频/优酷/芒果也能解析网易云音乐（需要会员）。内置摸头杀、给你一脚、给我按摩等娱乐功能。
  小说功能需另起 so-novel 实例（-Dmode=web，默认端口 7765），通过 /找小说 <书名> 触发搜索、分页选源、选格式并获取下载直链。

version: "1.10.13"
support_platforms:
  - aiocqhttp
  - telegram
  - slack
  - lark
  - discord
